name: Configurar Traccar no VPS

# Disparo manual — usar uma única vez para instalar/garantir o Traccar de pé
# antes da chegada dos rastreadores. Pode ser rodado de novo com segurança
# (idempotente): se o Traccar já estiver instalado, só confirma que está rodando.
on:
  workflow_dispatch:

jobs:
  setup-traccar:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar Docker (se necessário) e subir o Traccar
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -e

            if ! command -v docker &> /dev/null; then
              echo "Docker não encontrado, instalando..."
              curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
              sh /tmp/get-docker.sh
            else
              echo "Docker já instalado."
            fi

            if ! command -v jq &> /dev/null; then
              apt-get update -y && apt-get install -y jq
            fi

            if [ -z "$(docker ps -aq -f name=^traccar$)" ]; then
              echo "Criando container traccar (painel admin só em localhost:8082, GT06 público em 5023/udp)..."
              docker run -d \
                --name traccar \
                --restart unless-stopped \
                -p 127.0.0.1:8082:8082 \
                -p 5023:5023/udp \
                -v traccar-data:/opt/traccar/data \
                traccar/traccar:latest
              echo "Aguardando o Traccar inicializar..."
              sleep 20
            else
              echo "Container traccar já existe, garantindo que está rodando..."
              docker start traccar || true
              sleep 3
            fi

            echo "--- status do container ---"
            docker ps -f name=traccar

      - name: Abrir porta 5023/UDP no firewall (se ufw estiver ativo)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: false
          script: |
            if command -v ufw &> /dev/null && ufw status | grep -q "Status: active"; then
              ufw allow 5023/udp
              echo "Regra adicionada. Status atual:"
              ufw status | grep -E "5023|Status"
            else
              echo "ufw inativo ou não instalado neste VPS — nada a fazer aqui."
              echo "Se o provedor usa firewall/security group externo, libere 5023/UDP entrante manualmente."
            fi

      - name: Sincronizar credencial do Traccar com a esperada pelo app (sem expor valores)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: false
          script: |
            set -e
            ENV_FILE=/var/www/felogix/.env
            EXPECTED_PASS=admin
            if [ -f "$ENV_FILE" ]; then
              V=$(grep -E '^TRACCAR_PASS=' "$ENV_FILE" | cut -d= -f2-)
              [ -n "$V" ] && EXPECTED_PASS="$V"
            fi

            for i in $(seq 1 15); do
              CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8082/api/server)
              [ "$CODE" = "200" ] && break
              sleep 2
            done

            if [ "$EXPECTED_PASS" = "admin" ]; then
              echo "App está configurado para usar a senha padrão do Traccar — nada a sincronizar."
            else
              USER_ID=$(curl -s -u admin:admin http://localhost:8082/api/users | jq -r '.[0].id // empty')
              if [ -n "$USER_ID" ]; then
                CURRENT=$(curl -s -u admin:admin "http://localhost:8082/api/users/$USER_ID")
                UPDATED=$(echo "$CURRENT" | jq --arg p "$EXPECTED_PASS" '.password = $p')
                HTTP=$(curl -s -o /dev/null -w "%{http_code}" -u admin:admin -X PUT "http://localhost:8082/api/users/$USER_ID" -H "Content-Type: application/json" -d "$UPDATED")
                echo "Sincronização de credencial — HTTP $HTTP"
              else
                echo "Não foi possível localizar o usuário admin do Traccar via API."
              fi
            fi

      - name: Verificar saúde do Traccar
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8082/api/server)
            UDP_LISTEN=$(ss -lun | grep -c ":5023 " || true)

            echo "HTTP do Traccar (localhost:8082): $STATUS"
            echo "Listener GT06 em 5023/UDP ativo: $([ "$UDP_LISTEN" -gt 0 ] && echo sim || echo não)"

            if [ "$STATUS" = "200" ] && [ "$UDP_LISTEN" -gt 0 ]; then
              echo "✓ Traccar pronto para receber os rastreadores"
              exit 0
            else
              echo "✗ Algo não ficou como esperado"
              docker logs --tail 50 traccar
              exit 1
            fi
