name: Configurar Traccar no VPS

# Disparo manual — o Traccar já está instalado nativamente no VPS (fora de
# Docker, como serviço systemd "traccar", confirmado via diagnóstico). O que
# faltava era o listener GT06 (5023/udp): o traccar.xml não tinha a porta do
# protocolo configurada. Este workflow só completa o que falta — nunca
# reinstala nem substitui o que já está rodando. Idempotente: pode rodar de
# novo a qualquer momento sem risco (se o gt06.port já existir, não toca em
# nada).
on:
  workflow_dispatch:

jobs:
  setup-traccar:
    runs-on: ubuntu-latest
    steps:
      - name: Habilitar listener GT06 (5023/udp) se ainda não estiver configurado
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: false
          script: |
            set -e
            CONF=/opt/traccar/conf/traccar.xml

            if [ ! -f "$CONF" ]; then
              echo "Não encontrei $CONF — este workflow assume Traccar já instalado nativamente no VPS. Abortando sem alterar nada."
              exit 1
            fi

            if grep -q "key='gt06.port'" "$CONF" || grep -q 'key="gt06.port"' "$CONF"; then
              echo "Listener GT06 já configurado em traccar.xml — nada a fazer."
            else
              BACKUP="$CONF.bak.$(date +%s)"
              cp "$CONF" "$BACKUP"
              echo "Backup salvo em $BACKUP antes de qualquer alteração."

              sed -i "s#</properties>#    <entry key='gt06.port'>5023</entry>\n</properties>#" "$CONF"
              echo "Entrada gt06.port=5023 adicionada em traccar.xml."

              echo "Reiniciando só o serviço traccar (systemd) para aplicar..."
              systemctl restart traccar
              echo "Aguardando o Traccar voltar..."
              sleep 10

              if ! systemctl is-active --quiet traccar || [ "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8082/api/server)" != "200" ]; then
                echo "Algo deu errado após a alteração — restaurando o traccar.xml original e reiniciando de novo."
                cp "$BACKUP" "$CONF"
                systemctl restart traccar
                sleep 10
                echo "Revertido para o estado anterior. Backup preservado em $BACKUP para referência."
                exit 1
              fi
            fi

            echo "--- status do serviço traccar ---"
            systemctl is-active traccar

      - name: Abrir porta 5023/UDP no firewall (se ufw estiver ativo)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: false
          script: |
            if command -v ufw &> /dev/null && ufw status | grep -q "Status: active"; then
              ufw allow 5023/udp
              echo "Regra garantida. Status atual:"
              ufw status | grep -E "5023|Status"
            else
              echo "ufw inativo ou não instalado neste VPS — nada a fazer aqui."
              echo "Se o provedor usa firewall/security group externo, libere 5023/UDP entrante manualmente."
            fi

      - name: Sincronizar credencial do Traccar com a esperada pelo app (sem expor valores)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: false
          script: |
            set -e
            ENV_FILE=/var/www/felogix/.env
            EXPECTED_PASS=admin
            if [ -f "$ENV_FILE" ]; then
              V=$(grep -E '^TRACCAR_PASS=' "$ENV_FILE" | cut -d= -f2-)
              [ -n "$V" ] && EXPECTED_PASS="$V"
            fi

            command -v jq &> /dev/null || (apt-get update -y && apt-get install -y jq)

            for i in $(seq 1 15); do
              CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8082/api/server)
              [ "$CODE" = "200" ] && break
              sleep 2
            done

            if [ "$EXPECTED_PASS" = "admin" ]; then
              echo "App está configurado para usar a senha padrão do Traccar — nada a sincronizar."
            else
              USER_ID=$(curl -s -u admin:admin http://localhost:8082/api/users | jq -r '.[0].id // empty')
              if [ -n "$USER_ID" ]; then
                CURRENT=$(curl -s -u admin:admin "http://localhost:8082/api/users/$USER_ID")
                UPDATED=$(echo "$CURRENT" | jq --arg p "$EXPECTED_PASS" '.password = $p')
                HTTP=$(curl -s -o /dev/null -w "%{http_code}" -u admin:admin -X PUT "http://localhost:8082/api/users/$USER_ID" -H "Content-Type: application/json" -d "$UPDATED")
                echo "Sincronização de credencial — HTTP $HTTP"
              else
                echo "Não foi possível localizar o usuário admin do Traccar via API."
              fi
            fi

      - name: Verificar saúde do Traccar
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: false
          script: |
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8082/api/server)
            UDP_LISTEN=$(ss -lun | grep -c ":5023 " || true)

            echo "HTTP do Traccar (localhost:8082): $STATUS"
            echo "Listener GT06 em 5023/UDP ativo: $([ "$UDP_LISTEN" -gt 0 ] && echo sim || echo não)"

            if [ "$STATUS" = "200" ] && [ "$UDP_LISTEN" -gt 0 ]; then
              echo "✓ Traccar pronto para receber os rastreadores"
              exit 0
            else
              echo "✗ Algo não ficou como esperado"
              systemctl status traccar --no-pager -l | tail -n 30
              exit 1
            fi
