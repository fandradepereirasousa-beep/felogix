<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0C0C0C"/>
<title>Felogix Track</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap');
:root{
  --bg:#0C0C0C;--s1:#141414;--s2:#1a1a1a;--s3:#202020;
  --b1:#2a2a2a;--b2:#333;
  --red:#D91A1A;--green:#10b981;--amber:#f59e0b;--blue:#3b82f6;--orange:#f97316;
  --t1:#f0f0f0;--t2:#888;--t3:#444;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);}
.screen{position:fixed;inset:0;display:none;flex-direction:column;background:var(--bg);z-index:10;}
.screen.active{display:flex;}

/* LOGIN */
#ls{align-items:center;justify-content:center;}
#ls::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 20%,rgba(217,26,26,.12) 0%,transparent 60%);pointer-events:none;}
.lw{width:100%;max-width:380px;padding:24px;}
.logo-area{display:flex;flex-direction:column;align-items:center;margin-bottom:32px;}
.logo-wordmark{font-size:32px;font-weight:900;letter-spacing:-1px;}
.logo-wordmark span{color:var(--red);}
.logo-plan{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--t3);margin-top:4px;}
.lcard{background:var(--s1);border:1px solid var(--b1);border-radius:16px;padding:24px;}
.ltitle{font-size:15px;font-weight:700;margin-bottom:2px;}
.lsub{font-size:11px;color:var(--t2);margin-bottom:20px;}
.lf{margin-bottom:12px;}
.lf label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t2);display:block;margin-bottom:5px;}
.lf input{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:12px 14px;font-size:14px;color:var(--t1);font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;}
.lf input:focus{border-color:var(--red);}
.lbtn{width:100%;padding:13px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin-top:4px;transition:opacity .2s;}
.lbtn:hover{opacity:.88;}
.lerr{font-size:11px;color:var(--red);text-align:center;margin-top:8px;min-height:14px;}

/* TOPBAR */
.topbar{height:52px;background:rgba(12,12,12,.97);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;backdrop-filter:blur(12px);z-index:200;position:relative;}
.tb-logo{display:flex;align-items:center;gap:8px;}
.tb-wordmark{font-size:16px;font-weight:900;letter-spacing:-.5px;}
.tb-wordmark span{color:var(--red);}
.tb-plan{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--red);background:rgba(217,26,26,.1);border:1px solid rgba(217,26,26,.25);border-radius:4px;padding:2px 6px;}
.tb-sep{flex:1;}
.live-chip{display:flex;align-items:center;gap:5px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--green);padding:4px 9px;background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.2);border-radius:5px;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 1.4s infinite;}
.tb-icon{width:32px;height:32px;background:var(--s1);border:1px solid var(--b1);border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all .2s;position:relative;}
.tb-icon:hover{border-color:var(--red);}
.tb-ndot{position:absolute;top:5px;right:5px;width:6px;height:6px;background:var(--red);border-radius:50%;}
.tb-av{width:32px;height:32px;background:var(--red);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;cursor:pointer;flex-shrink:0;}
.role-badge{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:3px 7px;border-radius:4px;}
.rb-admin{background:rgba(217,26,26,.15);color:var(--red);border:1px solid rgba(217,26,26,.3);}
.rb-gestor{background:rgba(59,130,246,.12);color:var(--blue);border:1px solid rgba(59,130,246,.25);}
.rb-track{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.2);}

/* AVATAR MENU */
.av-menu{position:absolute;top:56px;right:10px;background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:6px;z-index:500;display:none;min-width:180px;box-shadow:0 8px 24px rgba(0,0,0,.5);}
.av-menu.open{display:block;}
.av-mi{padding:9px 12px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;transition:background .15s;}
.av-mi:hover{background:var(--s2);}
.av-mi.muted{color:var(--t2);font-size:11px;cursor:default;}
.av-mi.muted:hover{background:transparent;}
.av-divider{height:1px;background:var(--b1);margin:4px 0;}
.av-mi.danger{color:var(--red);}

/* BOTTOM NAV */
.bnav{height:60px;background:rgba(12,12,12,.97);border-top:1px solid var(--b1);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--t3);font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;transition:color .15s;padding:6px 2px;}
.bni.on{color:var(--red);}
.bni .ic{font-size:20px;}
.bni-dot{width:4px;height:4px;border-radius:50%;background:var(--red);display:none;}
.bni.on .bni-dot{display:block;}

/* CONTENT */
.content{flex:1;overflow-y:auto;overflow-x:hidden;}
.content::-webkit-scrollbar{width:3px;}
.content::-webkit-scrollbar-thumb{background:var(--b1);}
.pp{padding:14px;}

/* MAP */
#mapWrap{width:100%;height:100%;position:relative;}
#map{width:100%;height:100%;}
.leaflet-tile-pane{filter:brightness(.75) saturate(.5) contrast(1.1);}
.leaflet-container{background:var(--bg);}
.leaflet-control-zoom,.leaflet-control-attribution{display:none!important;}
.map-sb{position:absolute;top:0;left:0;bottom:0;width:260px;background:rgba(12,12,12,.97);border-right:1px solid var(--b1);backdrop-filter:blur(12px);z-index:100;transform:translateX(-100%);transition:transform .28s ease;display:flex;flex-direction:column;}
.map-sb.open{transform:translateX(0);}
.msb-head{padding:10px 12px;border-bottom:1px solid var(--b1);}
.msb-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:8px;}
.msb-s{background:var(--s2);border:1px solid var(--b1);border-radius:7px;padding:6px;text-align:center;}
.msb-s .v{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;}
.msb-s .l{font-size:8px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;}
.msb-s.online .v{color:var(--green);}
.msb-s.moving .v{color:var(--blue);}
.msb-s.stopped .v{color:var(--amber);}
.msb-srch{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--b1);border-radius:7px;padding:7px 10px;}
.msb-srch input{background:transparent;border:none;outline:none;font-size:12px;color:var(--t1);flex:1;font-family:'Inter',sans-serif;}
.msb-list{flex:1;overflow-y:auto;padding:6px;}
.msb-list::-webkit-scrollbar{width:2px;}
.msb-list::-webkit-scrollbar-thumb{background:var(--b1);}
.vmc{padding:8px 10px;border-radius:8px;cursor:pointer;margin-bottom:3px;border:1px solid transparent;transition:all .15s;}
.vmc:hover{background:var(--s2);}
.vmc.sel{background:rgba(217,26,26,.08);border-color:rgba(217,26,26,.3);}
.vmc-r1{display:flex;align-items:center;gap:7px;}
.vmc-plate{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;flex:1;}
.vmc-spd{font-size:10px;color:var(--t2);}
.vmc-spd.z{color:var(--t3);}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sdot.moving{background:var(--blue);}
.sdot.stopped{background:var(--amber);}
.sdot.offline{background:var(--t3);}
.sdot.blocked{background:var(--red);}
.map-fabs{position:absolute;bottom:80px;right:12px;display:flex;flex-direction:column;gap:8px;z-index:99;}
.fab{width:40px;height:40px;background:rgba(12,12,12,.92);border:1px solid var(--b1);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;backdrop-filter:blur(8px);transition:all .2s;}
.fab:hover{border-color:var(--red);}

/* BOTTOM SHEET */
.bsheet{position:absolute;bottom:0;left:0;right:0;z-index:150;transform:translateY(100%);transition:transform .3s ease;}
.bsheet.open{transform:translateY(0);}
.bsh{width:36px;height:4px;background:var(--b2);border-radius:2px;margin:10px auto 0;}
.bsc{background:var(--s1);border-top:1px solid var(--b1);border-radius:20px 20px 0 0;padding:10px 14px 24px;max-height:72vh;overflow-y:auto;}
.bsc::-webkit-scrollbar{width:3px;}
.bsc::-webkit-scrollbar-thumb{background:var(--b1);}
.vd-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--b1);}
.vd-photo{font-size:36px;flex-shrink:0;}
.vd-info{flex:1;}
.vd-plate{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;}
.vd-model{font-size:11px;color:var(--t2);margin-top:2px;}
.vd-status{display:inline-block;margin-top:5px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;letter-spacing:.5px;}
.vd-status.moving{background:rgba(59,130,246,.12);color:var(--blue);border:1px solid rgba(59,130,246,.25);}
.vd-status.stopped{background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.25);}
.vd-status.offline{background:rgba(68,68,68,.3);color:var(--t2);border:1px solid var(--b1);}
.vd-status.blocked{background:rgba(217,26,26,.12);color:var(--red);border:1px solid rgba(217,26,26,.3);}
.vd-close{width:28px;height:28px;background:var(--s2);border:1px solid var(--b1);border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;flex-shrink:0;}
.kpis-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;}
.kpi-sm{background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:8px 6px;text-align:center;}
.kpi-sm .v{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;}
.kpi-sm .l{font-size:8px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.vd-addr{font-size:11px;color:var(--t2);margin-bottom:12px;padding:8px 10px;background:var(--s2);border-radius:7px;border:1px solid var(--b1);}
.vd-acts{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px;}
.vd-btn{padding:11px;background:var(--s2);border:1px solid var(--b1);border-radius:9px;font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:all .2s;}
.vd-btn:hover{border-color:var(--b2);}
.vd-btn.danger{background:rgba(217,26,26,.1);border-color:rgba(217,26,26,.3);color:var(--red);}
.vd-btn.danger:hover{background:rgba(217,26,26,.18);}
.vd-btn.success{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.25);color:var(--green);}
.vd-btn.full{grid-column:1/-1;}
.hist-bar{display:flex;gap:2px;height:28px;margin-bottom:12px;}
.hist-seg{flex:1;border-radius:2px;}
.ev-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--b1);}
.ev-item:last-child{border:none;}
.ev-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t2);width:36px;flex-shrink:0;}
.ev-ic{font-size:13px;width:20px;text-align:center;flex-shrink:0;}
.ev-txt{font-size:11px;color:var(--t1);}
.ev-head{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:6px;margin-top:12px;}

/* VEÍCULOS */
.sec-title{display:flex;align-items:center;justify-content:space-between;font-size:14px;font-weight:700;margin-bottom:12px;}
.add-btn{font-size:11px;font-weight:600;padding:5px 12px;background:var(--red);color:#fff;border:none;border-radius:6px;cursor:pointer;}
.vcard{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:14px;margin-bottom:8px;}
.vc-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.vc-em{font-size:28px;}
.vc-info{flex:1;}
.vc-plate{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;}
.vc-model{font-size:10px;color:var(--t2);margin-top:1px;}
.vc-status{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;}
.vc-status.moving{background:rgba(59,130,246,.12);color:var(--blue);}
.vc-status.stopped{background:rgba(245,158,11,.1);color:var(--amber);}
.vc-status.offline{background:var(--s2);color:var(--t2);}
.vc-status.blocked{background:rgba(217,26,26,.12);color:var(--red);}
.vc-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:10px;}
.vc-kpi{background:var(--s2);border:1px solid var(--b1);border-radius:7px;padding:6px;text-align:center;}
.vc-kpi .v{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;}
.vc-kpi .l{font-size:8px;color:var(--t2);text-transform:uppercase;letter-spacing:.3px;}
.vc-acts{display:flex;gap:5px;}
.vc-act{flex:1;padding:8px;background:var(--s2);border:1px solid var(--b1);border-radius:7px;font-size:10px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;}
.vc-act:hover{border-color:var(--b2);}
.vc-act.block-btn{color:var(--red);border-color:rgba(217,26,26,.3);background:rgba(217,26,26,.07);}
.vc-act.unblock-btn{color:var(--green);border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.07);}

/* ALERTAS */
.alert-item{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:13px 14px;margin-bottom:7px;}
.alert-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.alert-ic{font-size:20px;}
.alert-name{font-size:13px;font-weight:600;}
.alert-desc{font-size:10px;color:var(--t2);margin-top:1px;}
.alert-channels{display:flex;gap:5px;}
.ch-toggle{flex:1;padding:7px 4px;text-align:center;font-size:10px;font-weight:600;border-radius:6px;cursor:pointer;border:1px solid var(--b1);background:var(--s2);color:var(--t3);transition:all .2s;user-select:none;}
.ch-toggle.on{border-color:rgba(217,26,26,.4);background:rgba(217,26,26,.08);color:var(--red);}

/* CONFIGURAÇÕES */
.cfg-section{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:16px;margin-bottom:10px;}
.cfg-title{font-size:12px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
.cfg-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--b1);}
.cfg-row:last-child{border:none;padding-bottom:0;}
.cfg-label{font-size:13px;font-weight:500;}
.cfg-sub{font-size:10px;color:var(--t2);margin-top:1px;}
.toggle{width:40px;height:22px;background:var(--b1);border-radius:11px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--red);}
.toggle::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform .2s;}
.toggle.on::after{transform:translateX(18px);}

/* NOTIFICAÇÕES */
.notif-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:9px;margin-bottom:6px;border:1px solid var(--b1);}
.notif-item.unread{background:rgba(217,26,26,.05);border-color:rgba(217,26,26,.2);}
.notif-unread-dot{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0;}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:1000;display:none;align-items:flex-end;}
.modal-ov.open{display:flex;}
.modal-box{width:100%;background:var(--s1);border-top:1px solid var(--b1);border-radius:20px 20px 0 0;padding:20px 20px 32px;max-height:85vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.modal-close{width:28px;height:28px;background:var(--s2);border:1px solid var(--b1);border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;}
.mf{margin-bottom:12px;}
.mf label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t2);display:block;margin-bottom:5px;}
.mf input,.mf select{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:11px 12px;font-size:13px;color:var(--t1);font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;}
.mf input:focus,.mf select:focus{border-color:var(--red);}
.mf select option{background:var(--s1);}
.mbtn{width:100%;padding:12px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin-top:4px;}
.mbtn.secondary{background:var(--s2);color:var(--t1);border:1px solid var(--b1);margin-top:8px;}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--s2);border:1px solid var(--b1);color:var(--t1);padding:10px 18px;border-radius:10px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:rgba(16,185,129,.4);color:var(--green);}
.toast.err{border-color:rgba(217,26,26,.4);color:var(--red);}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="screen active" id="ls">
  <div class="lw">
    <div class="logo-area">
      <svg width="52" height="52" viewBox="0 0 72 72" fill="none" style="margin-bottom:12px">
        <polygon points="4,4 20,4 68,68 52,68" fill="#D91A1A"/>
        <polygon points="52,4 68,4 20,68 4,68" fill="#D91A1A"/>
        <polygon points="36,28 44,36 36,44 28,36" fill="#0C0C0C"/>
      </svg>
      <div class="logo-wordmark">FEL<span>O</span>GIX</div>
      <div class="logo-plan">Track</div>
    </div>
    <div class="lcard">
      <div class="ltitle">Acesso à plataforma</div>
      <div class="lsub">Entre com suas credenciais</div>
      <div class="lf"><label>Email</label><input type="email" id="lEmail" placeholder="seu@email.com" autocomplete="username"/></div>
      <div class="lf"><label>Senha</label><input type="password" id="lPass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <button class="lbtn" onclick="doLogin()">Entrar</button>
      <div class="lerr" id="lerr"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div class="screen" id="appScreen">
  <div class="topbar">
    <div class="tb-logo">
      <svg width="22" height="22" viewBox="0 0 72 72" fill="none">
        <polygon points="4,4 20,4 68,68 52,68" fill="#D91A1A"/>
        <polygon points="52,4 68,4 20,68 4,68" fill="#D91A1A"/>
        <polygon points="36,28 44,36 36,44 28,36" fill="#0C0C0C"/>
      </svg>
      <span class="tb-wordmark">FEL<span>O</span>GIX</span>
      <span class="tb-plan">Track</span>
    </div>
    <div class="tb-sep"></div>
    <div class="live-chip" id="liveChip" style="display:none"><div class="live-dot"></div>LIVE</div>
    <span id="tbRole" class="role-badge"></span>
    <div class="tb-icon" onclick="toggleNotif()" id="notifBtn">🔔<div class="tb-ndot" id="notifDot" style="display:none"></div></div>
    <div class="tb-av" id="tbAv" onclick="toggleAvMenu()">--</div>
    <!-- avatar menu dentro da topbar pra herdar z-index -->
    <div class="av-menu" id="avMenu">
      <div class="av-mi muted" id="avName"></div>
      <div class="av-mi muted" id="avEmpresa" style="display:none"></div>
      <div class="av-divider"></div>
      <div class="av-mi" onclick="goTab('config');closeAvMenu()">⚙️ Configurações</div>
      <div class="av-divider"></div>
      <div class="av-mi danger" onclick="logout()">Sair</div>
    </div>
  </div>
  <div class="content" id="mainContent"></div>
  <div class="bnav" id="bnav"></div>
</div>

<!-- MODAL -->
<div class="modal-ov" id="modalOv" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-title"><span id="mTitle"></span><div class="modal-close" onclick="closeModal()">✕</div></div>
    <div id="mBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════ DADOS ══════════════ */
const USERS_DB = [
  {id:1, name:'Felipe Andrade',     email:'felipe.sousa@felogix.com.br', pass:'admin123',  role:'admin',  initials:'FA', empresa:'Felogix'},
  {id:2, name:'Frota Grupo Impacto',email:'frota@grupoimpacto.com.br', pass:'Frota@123', role:'gestor', initials:'FI', empresa:'Impacto Segurança', alertEmail:'frota@grupoimpacto.com.br'},
];

// Veículos vinculados por empresa
let VEHICLES = [
  {id:1,empresa:'Impacto Segurança',plate:'IMP-0A23',model:'Fiat Strada',  ano:2021,cor:'Branca', status:'moving', lat:-23.5505,lng:-46.6333,speed:54, ignition:true, odometer:48589,updated:'agora',   blocked:false,foto:'🚗'},
  {id:2,empresa:'Impacto Segurança',plate:'IMP-1B45',model:'Toyota Hilux', ano:2020,cor:'Prata',  status:'stopped',lat:-23.5608,lng:-46.6565,speed:0,  ignition:true, odometer:91204,updated:'3 min',  blocked:false,foto:'🛻'},
  {id:3,empresa:'Impacto Segurança',plate:'IMP-2C67',model:'VW Gol',       ano:2022,cor:'Preto',  status:'moving', lat:-23.5452,lng:-46.6185,speed:38, ignition:true, odometer:23789,updated:'agora',   blocked:false,foto:'🚗'},
  {id:4,empresa:'Impacto Segurança',plate:'IMP-3D89',model:'Ford Ranger',  ano:2019,cor:'Cinza',  status:'offline',lat:-23.5720,lng:-46.6450,speed:0,  ignition:false,odometer:67543,updated:'1h 20min',blocked:false,foto:'🚙'},
  {id:5,empresa:'Impacto Segurança',plate:'IMP-4E01',model:'Renault Duster',ano:2023,cor:'Vermelha',status:'moving',lat:-23.5380,lng:-46.6520,speed:67,ignition:true, odometer:34120,updated:'agora',   blocked:false,foto:'🚗'},
];

const ALERTAS_CONFIG = [
  {id:1,ic:'⚡',nome:'Excesso de velocidade',   desc:'Quando ultrapassar o limite configurado'},
  {id:2,ic:'🔒',nome:'Bloqueio / Desbloqueio',  desc:'Quando a ignição for bloqueada ou liberada'},
  {id:3,ic:'📍',nome:'Saída de geocerca',        desc:'Quando o veículo sair da área configurada'},
  {id:4,ic:'📵',nome:'Veículo offline',          desc:'Sem sinal por mais de 30 minutos'},
  {id:5,ic:'🔑',nome:'Ignição fora do horário',  desc:'Ligou fora do turno configurado'},
];

// Preferências de alerta por usuário — gestor configura pra empresa dele
let alertPrefs = {
  2: {email: 'frota@grupoimpacto.com.br', alertas: {1:true,2:true,3:true,4:true,5:false}},
};

let NOTIFS = [
  {id:1,ic:'⚡',txt:'IMP-4E01 — 87 km/h na Av. Paulista',time:'09:42',read:false},
  {id:2,ic:'📵',txt:'IMP-3D89 offline há 1h 20min',       time:'08:31',read:false},
  {id:3,ic:'🔑',txt:'IMP-1B45 ignição fora do horário',   time:'07:55',read:true},
];

let CU = null;
let map = null, markers = {}, routeLayer = null;
let selV = null, mapSbOpen = false, currentTab = '';

/* ══════════════ LOGIN ══════════════ */
function doLogin() {
  const email = document.getElementById('lEmail').value.trim();
  const pass  = document.getElementById('lPass').value.trim();
  const u = USERS_DB.find(x => x.email === email && x.pass === pass);
  if (!u) { document.getElementById('lerr').textContent = 'Email ou senha incorretos'; return; }
  CU = u;
  document.getElementById('ls').classList.remove('active');
  document.getElementById('appScreen').classList.add('active');
  document.getElementById('tbAv').textContent = u.initials;
  document.getElementById('avName').textContent = u.name;
  const empEl = document.getElementById('avEmpresa');
  if (u.empresa && u.role !== 'admin') { empEl.textContent = u.empresa; empEl.style.display='block'; }
  const rl = {admin:'Super Admin',gestor:'Gestor',track:'Meu Veículo'};
  const rc = {admin:'rb-admin',gestor:'rb-gestor',track:'rb-track'};
  const rb = document.getElementById('tbRole');
  rb.textContent = rl[u.role]||u.role; rb.className='role-badge '+(rc[u.role]||'rb-track');
  document.getElementById('liveChip').style.display = u.role==='track'?'none':'flex';
  const unread = NOTIFS.some(n=>!n.read);
  document.getElementById('notifDot').style.display = unread?'block':'none';
  buildNav(); goTab('mapa');
  setInterval(liveMove, 4000);
}

function logout() {
  CU=null; map=null; markers={}; selV=null;
  document.getElementById('appScreen').classList.remove('active');
  document.getElementById('ls').classList.add('active');
  document.getElementById('lEmail').value='';
  document.getElementById('lPass').value='';
  document.getElementById('lerr').textContent='';
  document.getElementById('liveChip').style.display='none';
  document.getElementById('avEmpresa').style.display='none';
  closeAvMenu();
}

/* ══════════════ NAV ══════════════ */
function buildNav() {
  const base = [{ic:'🗺',lbl:'Mapa',id:'mapa'},{ic:'🚗',lbl:'Veículos',id:'veiculos'},{ic:'🔔',lbl:'Alertas',id:'alertas'}];
  if (CU.role==='admin') base.push({ic:'⚙️',lbl:'Config',id:'config'});
  document.getElementById('bnav').innerHTML = base.map(t=>
    `<div class="bni" id="bni_${t.id}" onclick="goTab('${t.id}',this)">
      <div class="ic">${t.ic}</div><div>${t.lbl}</div><div class="bni-dot"></div>
    </div>`).join('');
}

function goTab(id, el) {
  document.querySelectorAll('.bni').forEach(b=>b.classList.remove('on'));
  const btn = el || document.getElementById('bni_'+id);
  if (btn) btn.classList.add('on');
  currentTab = id;
  closeAvMenu();
  const c = document.getElementById('mainContent');
  ({mapa:()=>renderMapa(c), veiculos:()=>renderVeiculos(c), alertas:()=>renderAlertas(c), config:()=>renderConfig(c)}[id]||(() => {}))();
}

/* ══════════════ MAPA ══════════════ */
function getMyVehicles() {
  if (CU.role==='admin') return VEHICLES;
  if (CU.role==='gestor') return VEHICLES.filter(v=>v.empresa===CU.empresa);
  return VEHICLES.slice(0,1);
}

function renderMapa(c) {
  const vs = getMyVehicles();
  c.innerHTML = `<div id="mapWrap" style="width:100%;height:100%;position:relative;">
    <div id="map"></div>
    <div class="map-sb" id="mapSb">
      <div class="msb-head">
        <div class="msb-stats">
          <div class="msb-s online"><div class="v">${vs.filter(v=>v.status!=='offline').length}</div><div class="l">Online</div></div>
          <div class="msb-s moving"><div class="v">${vs.filter(v=>v.status==='moving').length}</div><div class="l">Em rota</div></div>
          <div class="msb-s stopped"><div class="v">${vs.filter(v=>v.status==='stopped').length}</div><div class="l">Parado</div></div>
        </div>
        <div class="msb-srch"><span style="color:var(--t3)">🔍</span><input placeholder="Placa ou modelo…" oninput="filterMapList(this.value)"/></div>
      </div>
      <div class="msb-list" id="mapList">${buildMapList(vs)}</div>
    </div>
    <div class="map-fabs">
      <div class="fab" onclick="toggleMapSb()">☰</div>
      <div class="fab" onclick="centerAll()">⊙</div>
    </div>
    <div class="bsheet" id="bsheet"><div class="bsh"></div><div class="bsc" id="bshContent"></div></div>
  </div>`;
  setTimeout(()=>initMap(), 80);
}

function initMap() {
  if (map){map.remove();map=null;}
  map = L.map('map',{zoomControl:false}).setView([-23.549,-46.638],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  getMyVehicles().forEach(v=>addMkr(v));
  centerAll();
}

function mkIcon(v) {
  const c = v.blocked?'#D91A1A':v.status==='moving'?'#3b82f6':v.status==='stopped'?'#f59e0b':'#333';
  const sym = v.status==='moving'?'▶':'●';
  const sel = selV===v.id;
  return L.divIcon({
    html:`<div style="background:${c};width:${sel?34:28}px;height:${sel?34:28}px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,${sel?.35:.15});box-shadow:0 3px 14px rgba(0,0,0,.7)${sel?',0 0 0 3px rgba(217,26,26,.4)':''};font-size:10px;color:#fff"><span style="transform:rotate(45deg)">${sym}</span></div>
    <div style="background:${c};color:#fff;font-size:8px;font-weight:700;font-family:monospace;padding:1px 5px;border-radius:3px;margin-top:2px;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.5)">${v.plate}</div>`,
    iconSize:[65,50],iconAnchor:[sel?17:14,48],className:''
  });
}

function addMkr(v){const m=L.marker([v.lat,v.lng],{icon:mkIcon(v)}).addTo(map);m.on('click',()=>openBS(v.id));markers[v.id]=m;}
function syncMkrs(){VEHICLES.forEach(v=>{if(markers[v.id]){markers[v.id].setLatLng([v.lat,v.lng]);markers[v.id].setIcon(mkIcon(v));}});}
function centerAll(){const vs=getMyVehicles().filter(v=>v.status!=='offline');if(vs.length&&map)map.fitBounds(L.latLngBounds(vs.map(v=>[v.lat,v.lng])),{padding:[60,60]});}

function buildMapList(vs){
  return vs.map(v=>{
    const dotC=v.blocked?'blocked':v.status;
    return `<div class="vmc${selV===v.id?' sel':''}" onclick="openBS(${v.id})">
      <div class="vmc-r1"><div class="sdot ${dotC}"></div><div class="vmc-plate">${v.plate}</div>
      <div style="flex:1;font-size:10px;color:var(--t2)">${v.model.split(' ')[0]}</div>
      <div class="vmc-spd${v.speed===0?' z':''}">${v.speed>0?v.speed+' km/h':'—'}</div></div>
    </div>`;
  }).join('');
}

function filterMapList(q){
  const el=document.getElementById('mapList');if(!el)return;
  const vs=getMyVehicles().filter(v=>!q||(v.plate+v.model).toLowerCase().includes(q.toLowerCase()));
  el.innerHTML=buildMapList(vs);
}

function toggleMapSb(){mapSbOpen=!mapSbOpen;document.getElementById('mapSb')?.classList.toggle('open',mapSbOpen);}

/* ══════════════ BOTTOM SHEET ══════════════ */
function openBS(id) {
  const v=VEHICLES.find(x=>x.id===id);if(!v)return;
  selV=id; syncMkrs();
  if(map) map.flyTo([v.lat,v.lng],15,{duration:.7});
  const stKey=v.blocked?'blocked':v.status;
  const stMap={moving:{cls:'moving',txt:'▶ Em rota'},stopped:{cls:'stopped',txt:'■ Parado'},offline:{cls:'offline',txt:'● Offline'},blocked:{cls:'blocked',txt:'🔒 Bloqueado'}};
  const blockBtn=v.blocked
    ?`<div class="vd-btn success full" onclick="toggleBlock(${v.id})">✅ Desbloquear ignição</div>`
    :`<div class="vd-btn danger full" onclick="toggleBlock(${v.id})">🔒 Bloquear ignição</div>`;
  const histBars=Array.from({length:24},()=>{const on=Math.random()>.35;const sp=on?Math.floor(Math.random()*80):0;const col=sp>60?'var(--red)':sp>0?'var(--blue)':'var(--s3)';return `<div class="hist-seg" style="background:${col}"></div>`;}).join('');
  document.getElementById('bshContent').innerHTML=`
    <div class="vd-top">
      <div class="vd-photo">${v.foto}</div>
      <div class="vd-info">
        <div class="vd-plate">${v.plate}</div>
        <div class="vd-model">${v.model} ${v.ano} · ${v.cor}</div>
        <div class="vd-status ${stMap[stKey].cls}">${stMap[stKey].txt}</div>
      </div>
      <div class="vd-close" onclick="closeBS()">✕</div>
    </div>
    <div class="kpis-grid">
      <div class="kpi-sm"><div class="v" style="color:var(--blue)">${v.speed}</div><div class="l">km/h</div></div>
      <div class="kpi-sm"><div class="v">${v.ignition?'🟢':'🔴'}</div><div class="l">Ignição</div></div>
      <div class="kpi-sm"><div class="v" style="color:var(--t2);font-size:11px">${v.odometer.toLocaleString('pt-BR')}</div><div class="l">km total</div></div>
      <div class="kpi-sm"><div class="v" style="color:var(--t2);font-size:11px">${v.updated}</div><div class="l">Atualiz.</div></div>
    </div>
    <div class="vd-addr">📍 <span id="bsAddr" style="color:var(--t1)">Buscando endereço…</span></div>
    <div class="vd-acts">
      <div class="vd-btn" onclick="showRoute(${v.id})">📍 Ver rota</div>
      <div class="vd-btn" onclick="closeBS()">✕ Fechar</div>
      ${blockBtn}
    </div>
    <div class="ev-head">Atividade — últimas 12h</div>
    <div class="hist-bar">${histBars}</div>
    <div class="ev-head">Eventos recentes</div>
    <div>
      ${[{time:'09:42',ic:'▶',txt:'<strong>Em rota</strong> — 54 km/h'},{time:'09:18',ic:'⏸',txt:'Parada de <strong>8 min</strong>'},{time:'08:55',ic:'📍',txt:'Entrou na <strong>geocerca</strong>'},{time:'08:12',ic:'🔑',txt:'<strong>Ignição ligada</strong>'}]
        .map(e=>`<div class="ev-item"><div class="ev-time">${e.time}</div><div class="ev-ic">${e.ic}</div><div class="ev-txt">${e.txt}</div></div>`).join('')}
    </div>`;
  document.getElementById('bsheet').classList.add('open');
  setTimeout(()=>{const el=document.getElementById('bsAddr');if(el)el.textContent=['Av. Paulista, 1000','R. Augusta, 456','Av. Angélica, 2100'][Math.floor(Math.random()*3)];},600);
}

function closeBS(){document.getElementById('bsheet').classList.remove('open');selV=null;syncMkrs();}

function toggleBlock(id) {
  const v=VEHICLES.find(x=>x.id===id);if(!v)return;
  v.blocked=!v.blocked;
  if(v.blocked){v.status='stopped';v.speed=0;v.ignition=false;}
  else{v.ignition=true;}
  toast(v.blocked?`🔒 ${v.plate} bloqueado`:`✅ ${v.plate} desbloqueado`,v.blocked?'err':'ok');
  syncMkrs(); openBS(id);
  if(currentTab==='veiculos') renderVeiculos(document.getElementById('mainContent'));
}

function showRoute(id) {
  const v=VEHICLES.find(x=>x.id===id);if(!v||!map)return;
  if(routeLayer){map.removeLayer(routeLayer);routeLayer=null;}
  const pts=[[v.lat,v.lng],[v.lat+.008,v.lng-.012],[v.lat+.016,v.lng-.005],[v.lat+.011,v.lng+.009],[v.lat-.005,v.lng+.015]];
  const line=L.polyline(pts,{color:'#D91A1A',weight:3,opacity:.8,dashArray:'10,6'}).addTo(map);
  const orig=L.circleMarker(pts[pts.length-1],{radius:7,color:'#D91A1A',fillColor:'#D91A1A',fillOpacity:1,weight:2}).addTo(map);
  routeLayer=L.layerGroup([line,orig]).addTo(map);
  map.fitBounds(L.latLngBounds(pts),{padding:[50,50]});
  toast(`Rota ${v.plate} — últimas 12h`,'ok'); closeBS();
}

function liveMove() {
  VEHICLES.forEach(v=>{if(v.status==='moving'&&!v.blocked){v.lat+=(Math.random()-.5)*.002;v.lng+=(Math.random()-.5)*.002;v.speed=Math.round(Math.max(20,Math.min(90,v.speed+(Math.random()-.5)*10)));v.updated='agora';}});
  syncMkrs(); if(selV) openBS(selV);
}

/* ══════════════ VEÍCULOS ══════════════ */
function renderVeiculos(c) {
  const vs = getMyVehicles();
  c.innerHTML=`<div class="pp">
    <div class="sec-title">
      Frota <span style="color:var(--t2);font-size:11px;font-weight:400">${vs.length} veículo${vs.length!==1?'s':''}</span>
      ${CU.role==='admin'?`<button class="add-btn" onclick="openAddVeiculo()">＋ Veículo</button>`:''}
    </div>
    ${vs.map(v=>{
      const stKey=v.blocked?'blocked':v.status;
      const stTxt={moving:'▶ Em rota',stopped:'■ Parado',offline:'● Offline',blocked:'🔒 Bloqueado'};
      return `<div class="vcard">
        <div class="vc-top">
          <div class="vc-em">${v.foto}</div>
          <div class="vc-info"><div class="vc-plate">${v.plate}</div><div class="vc-model">${v.model} ${v.ano} · ${v.cor}</div></div>
          <span class="vc-status ${stKey}">${stTxt[stKey]}</span>
        </div>
        <div class="vc-kpis">
          <div class="vc-kpi"><div class="v" style="color:var(--blue)">${v.speed} km/h</div><div class="l">Velocidade</div></div>
          <div class="vc-kpi"><div class="v">${v.ignition?'🟢':'🔴'}</div><div class="l">Ignição</div></div>
          <div class="vc-kpi"><div class="v" style="font-size:11px;color:var(--t2)">${v.odometer.toLocaleString('pt-BR')}</div><div class="l">km total</div></div>
        </div>
        <div class="vc-acts">
          <div class="vc-act" onclick="goTab('mapa');setTimeout(()=>openBS(${v.id}),300)">🗺 Ver no mapa</div>
          <div class="vc-act ${v.blocked?'unblock-btn':'block-btn'}" onclick="toggleBlock(${v.id})">${v.blocked?'✅ Desbloquear':'🔒 Bloquear'}</div>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

/* ══════════════ ALERTAS ══════════════ */
function renderAlertas(c) {
  // marca todas como lidas
  NOTIFS.forEach(n=>n.read=true);
  document.getElementById('notifDot').style.display='none';

  const prefs = alertPrefs[CU.id] || {email: CU.email||'', alertas:{}};
  ALERTAS_CONFIG.forEach(a=>{ if(prefs.alertas[a.id]===undefined) prefs.alertas[a.id]=true; });

  const notifsHtml = NOTIFS.map(n=>`
    <div class="notif-item${n.read?'':' unread'}">
      <span style="font-size:18px">${n.ic}</span>
      <div style="flex:1"><div style="font-size:12px;font-weight:500">${n.txt}</div><div style="font-size:10px;color:var(--t2);margin-top:2px">${n.time}</div></div>
      ${!n.read?'<div class="notif-unread-dot"></div>':''}
    </div>`).join('');

  const emailInfo = CU.role==='gestor'
    ? `<div class="cfg-section" style="margin-bottom:12px">
        <div class="cfg-title">Email para receber alertas</div>
        <div style="display:flex;gap:8px;align-items:center">
          <input id="alertEmailInput" value="${prefs.email}" style="flex:1;background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--t1);font-family:Inter,sans-serif;outline:none;" placeholder="email@empresa.com"/>
          <button onclick="saveAlertEmail()" style="padding:10px 14px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap">Salvar</button>
        </div>
        <div style="font-size:10px;color:var(--t2);margin-top:8px">📧 Alertas ativos serão enviados para este email</div>
      </div>` : '';

  const alertsHtml = ALERTAS_CONFIG.map(a=>`
    <div class="alert-item">
      <div class="alert-top">
        <span class="alert-ic">${a.ic}</span>
        <div style="flex:1"><div class="alert-name">${a.nome}</div><div class="alert-desc">${a.desc}</div></div>
        <div class="toggle${prefs.alertas[a.id]?' on':''}" onclick="toggleAlertPref(${a.id},this)"></div>
      </div>
    </div>`).join('');

  c.innerHTML=`<div class="pp">
    <div class="sec-title">Notificações recentes</div>
    ${notifsHtml}
    <div class="sec-title" style="margin-top:20px">Configurar alertas por email</div>
    ${emailInfo}
    ${alertsHtml}
    <button class="add-btn" style="width:100%;padding:12px;border-radius:8px;font-size:13px;margin-top:4px" onclick="saveAlertPrefs()">Salvar preferências</button>
  </div>`;
}

function toggleAlertPref(alertId, el) {
  if (!alertPrefs[CU.id]) alertPrefs[CU.id]={email:CU.email||'',alertas:{}};
  alertPrefs[CU.id].alertas[alertId] = !alertPrefs[CU.id].alertas[alertId];
  el.classList.toggle('on', alertPrefs[CU.id].alertas[alertId]);
}

function saveAlertEmail() {
  const input = document.getElementById('alertEmailInput');
  if (!input) return;
  const email = input.value.trim();
  if (!email || !email.includes('@')) { toast('Email inválido','err'); return; }
  if (!alertPrefs[CU.id]) alertPrefs[CU.id]={email:'',alertas:{}};
  alertPrefs[CU.id].email = email;
  const u = USERS_DB.find(x=>x.id===CU.id);
  if (u) u.alertEmail = email;
  toast('Email salvo ✅','ok');
}

function saveAlertPrefs() {
  toast('Preferências salvas ✅','ok');
}

/* ══════════════ CONFIG (admin) ══════════════ */
function renderConfig(c) {
  c.innerHTML=`<div class="pp">
    <div class="sec-title">Clientes</div>
    <div class="cfg-section">
      <div class="cfg-title">Empresas cadastradas</div>
      ${USERS_DB.filter(u=>u.role==='gestor').map(u=>`
        <div class="cfg-row">
          <div><div class="cfg-label">${u.empresa}</div><div class="cfg-sub">${u.email}</div></div>
          <span style="font-size:10px;font-weight:700;color:var(--green);background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);padding:3px 8px;border-radius:5px">Ativo</span>
        </div>`).join('')}
    </div>
    <button class="add-btn" style="width:100%;padding:12px;border-radius:8px;font-size:13px;margin-bottom:20px" onclick="openAddCliente()">＋ Novo cliente</button>

    <div class="sec-title">Veículos — todos</div>
    <div class="cfg-section">
      ${VEHICLES.map(v=>`
        <div class="cfg-row">
          <div><div class="cfg-label" style="font-family:'JetBrains Mono',monospace">${v.plate}</div><div class="cfg-sub">${v.model} · ${v.empresa}</div></div>
          <span class="vc-status ${v.blocked?'blocked':v.status}" style="font-size:9px">${v.blocked?'Bloqueado':v.status==='moving'?'Em rota':v.status==='stopped'?'Parado':'Offline'}</span>
        </div>`).join('')}
    </div>
    <button class="add-btn" style="width:100%;padding:12px;border-radius:8px;font-size:13px" onclick="openAddVeiculo()">＋ Adicionar veículo</button>
  </div>`;
}

/* ══════════════ MODAIS ══════════════ */
function openAddCliente() {
  document.getElementById('mTitle').textContent='Novo cliente';
  document.getElementById('mBody').innerHTML=`
    <div class="mf"><label>Nome da empresa</label><input id="mEmpresa" placeholder="Ex: Transportadora ABC"/></div>
    <div class="mf"><label>Email do gestor</label><input id="mGestorEmail" type="email" placeholder="gestor@empresa.com"/></div>
    <div class="mf"><label>Senha inicial</label><input id="mGestorPass" type="text" placeholder="Senha@123"/></div>
    <button class="mbtn" onclick="saveCliente()">Cadastrar cliente</button>`;
  document.getElementById('modalOv').classList.add('open');
}

function saveCliente() {
  const empresa = document.getElementById('mEmpresa').value.trim();
  const email   = document.getElementById('mGestorEmail').value.trim();
  const pass    = document.getElementById('mGestorPass').value.trim();
  if (!empresa||!email||!pass) { toast('Preencha todos os campos','err'); return; }
  const initials = empresa.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  USERS_DB.push({id:USERS_DB.length+1,name:'Gestor '+empresa,email,pass,role:'gestor',initials,empresa,alertEmail:email});
  alertPrefs[USERS_DB.length] = {email, alertas:{1:true,2:true,3:true,4:true,5:false}};
  closeModal();
  renderConfig(document.getElementById('mainContent'));
  toast(`${empresa} cadastrado ✅`,'ok');
}

function openAddVeiculo() {
  const empresas = CU.role==='admin'
    ? [...new Set(USERS_DB.filter(u=>u.role==='gestor').map(u=>u.empresa))]
    : [CU.empresa];
  document.getElementById('mTitle').textContent='Adicionar veículo';
  document.getElementById('mBody').innerHTML=`
    <div class="mf"><label>Placa</label><input id="mPlate" placeholder="IMP-0000"/></div>
    <div class="mf"><label>Modelo</label><input id="mModel" placeholder="Ex: Fiat Strada"/></div>
    <div class="mf"><label>Ano</label><input id="mAno" type="number" placeholder="2024"/></div>
    <div class="mf"><label>Cor</label><input id="mCor" placeholder="Ex: Branca"/></div>
    ${CU.role==='admin'?`<div class="mf"><label>Empresa</label><select id="mEmpresaV">${empresas.map(e=>`<option>${e}</option>`).join('')}</select></div>`:''}
    <button class="mbtn" onclick="saveVeiculo()">Adicionar</button>`;
  document.getElementById('modalOv').classList.add('open');
}

function saveVeiculo() {
  const plate = document.getElementById('mPlate').value.trim();
  if (!plate) { toast('Informe a placa','err'); return; }
  const empresa = CU.role==='admin'
    ? (document.getElementById('mEmpresaV')?.value || VEHICLES[0].empresa)
    : CU.empresa;
  VEHICLES.push({
    id:VEHICLES.length+1, empresa,
    plate:plate.toUpperCase(),
    model:document.getElementById('mModel').value||'Veículo',
    ano:parseInt(document.getElementById('mAno').value)||2024,
    cor:document.getElementById('mCor').value||'—',
    status:'offline',lat:-23.55+Math.random()*.05,lng:-46.63+Math.random()*.05,
    speed:0,ignition:false,odometer:0,updated:'agora',blocked:false,foto:'🚗'
  });
  closeModal();
  if(currentTab==='veiculos') renderVeiculos(document.getElementById('mainContent'));
  else if(currentTab==='config') renderConfig(document.getElementById('mainContent'));
  toast(`${plate.toUpperCase()} adicionado ✅`,'ok');
}

function closeModal(){document.getElementById('modalOv').classList.remove('open');}

/* ══════════════ NOTIF / AV MENU ══════════════ */
function toggleNotif(){NOTIFS.forEach(n=>n.read=true);document.getElementById('notifDot').style.display='none';goTab('alertas');}
function toggleAvMenu(){document.getElementById('avMenu').classList.toggle('open');}
function closeAvMenu(){document.getElementById('avMenu').classList.remove('open');}
document.addEventListener('click',e=>{if(!e.target.closest('#tbAv')&&!e.target.closest('#avMenu'))closeAvMenu();});

/* ══════════════ TOAST ══════════════ */
let toastTimer;
function toast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(type?' '+type:'');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
}
</script>
</body>
</html>
